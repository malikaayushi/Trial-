<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);
    overflow:hidden;
    color:white;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 10s infinite linear;
}

.circle:nth-child(1){
    width:250px;
    height:250px;
    top:10%;
    left:5%;
}

.circle:nth-child(2){
    width:350px;
    height:350px;
    bottom:-100px;
    right:10%;
}

.circle:nth-child(3){
    width:180px;
    height:180px;
    top:60%;
    left:40%;
}

@keyframes float{
    50%{
        transform:translateY(-40px);
    }
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
    position:relative;
    z-index:10;
}

.logo{
    font-size:2rem;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    color:white;
    text-decoration:none;
}

.hero{
    position:relative;
    z-index:10;
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.card{
    width:700px;
    padding:50px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
}

.card h1{
    font-size:4rem;
    margin-bottom:20px;
}

.card p{
    font-size:1.1rem;
    color:#dbeafe;
    line-height:1.7;
}

.btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    background:white;
    color:#7c3aed;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

.counter{
    margin-top:25px;
    font-size:1.5rem;
    color:#facc15;
}
</style>
</head>
<body>

<div class="bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<nav>
    <div class="logo">NovaX</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="card">
        <h1>Future Starts Here</h1>

        <p>
            Build amazing experiences with modern design,
            smooth animations and powerful JavaScript.
        </p>

        <button class="btn" onclick="increaseCount()">
            Explore
        </button>

        <div class="counter">
            Visitors: <span id="count">0</span>
        </div>
    </div>
</section>

<script>
let count = 0;

function increaseCount(){
    count++;
    document.getElementById("count").textContent = count;
}

document.addEventListener("mousemove",(e)=>{
    document.querySelectorAll(".circle").forEach((circle,index)=>{
        let speed = (index + 1) * 0.01;
        circle.style.transform =
        `translate(${e.clientX*speed}px,${e.clientY*speed}px)`;
    });
});
</script>

</body>
</html>
